[package]
name = "pi-agent-core"
version = "0.1.0"
edition = "2024"

[dependencies]
pi-ai = { path = "../pi-ai" }
futures = "0.3"
tokio-util = "0.7"
async-stream = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
